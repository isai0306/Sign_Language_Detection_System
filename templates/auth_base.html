<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>{% block title %}SignAI Auth{% endblock %}</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", system-ui, sans-serif;
            min-height: 100vh;
            overflow: hidden;
        }

        /* ================= BACK BUTTON ================= */
        .back-btn {
            position: fixed;
            top: 24px;
            left: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0.55rem 1rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.35);
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.25s ease;
            z-index: 1000;
        }

        .back-btn:hover {
            transform: translateX(-3px);
            background: rgba(255,255,255,0.28);
        }

        .back-btn span {
            font-size: 1.1rem;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- BACK BUTTON -->
    {% if show_back is not defined or show_back %}
    <a href="{{ back_url if back_url is defined else url_for('home') }}" class="back-btn">
        <span>←</span> Back
    </a>
    {% endif %}

    {% block content %}{% endblock %}

    {% block extra_js %}{% endblock %}
</body>
</html>
