{% extends "base.html" %}

{% block title %}Register - SignAI{% endblock %}

{% block extra_css %}
<style>
    .register-shell {
        max-width: 560px;
        margin: 0 auto;
    }

    .register-shell .card {
        padding: var(--space-4);
    }

    @media (max-width: 768px) {
        .register-shell .card {
            padding: var(--space-3);
        }
    }
</style>
{% endblock %}

{% block content %}
<section class="register-shell">
    <div class="card">
        <h1 class="auth-title">Create account</h1>
        <p class="auth-subtitle">Join SignAI and start accessible communication in minutes.</p>

        <form method="POST" action="{{ url_for('auth.user_register') }}" class="form-stack">
            <div class="field">
                <input id="register_number" type="text" name="register_number" placeholder=" " required>
                <label for="register_number">Register number</label>
            </div>

            <div class="field">
                <input id="name" type="text" name="name" placeholder=" " required>
                <label for="name">Full name</label>
            </div>

            <div class="field">
                <input id="email" type="email" name="email" placeholder=" " required>
                <label for="email">Email address</label>
            </div>

            <div class="field">
                <input id="phone" type="tel" name="phone" placeholder=" ">
                <label for="phone">Phone number (optional)</label>
            </div>

            <div class="field">
                <input id="password" type="password" name="password" placeholder=" " minlength="6" required>
                <label for="password">Password (min 6 characters)</label>
            </div>

            <div class="field">
                <input id="confirm_password" type="password" name="confirm_password" placeholder=" " minlength="6" required>
                <label for="confirm_password">Confirm password</label>
            </div>

            <button type="submit" class="btn btn-primary">Register</button>
        </form>

        <p class="helper" style="margin-top: var(--space-2);">
            Already have an account? <a href="{{ url_for('auth.user_login') }}" style="color: var(--primary); font-weight: 600;">Login here</a>
        </p>
    </div>
</section>
{% endblock %}
