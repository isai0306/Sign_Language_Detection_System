{% extends "auth_base.html" %}

{% block title %}Admin Login | SignAI{% endblock %}

{% block content %}
<section class="page-shell">
  <div class="card auth-card">
    <h1 class="auth-title">Admin access</h1>
    <p class="auth-subtitle">Secure monitoring and control panel.</p>

    <form method="POST" action="{{ url_for('auth.admin_login') }}" class="form-stack">
      <div class="field">
        <input type="text" id="admin_id" name="admin_id" placeholder=" " required autocomplete="username">
        <label for="admin_id">Admin ID</label>
      </div>

      <div class="field">
        <input type="password" id="password" name="password" placeholder=" " required autocomplete="current-password">
        <label for="password">Password</label>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;">Sign in</button>
    </form>

    <p class="helper" style="margin-top: var(--space-2);">Authorized personnel only.</p>
  </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
setTimeout(() => {
  document.querySelectorAll(".alert").forEach((msg) => {
    msg.style.opacity = "0";
    msg.style.transform = "translateY(-6px)";
    setTimeout(() => msg.remove(), 220);
  });
}, 5000);
</script>
{% endblock %}
